services:
    filebrowser:
        image: filebrowser/filebrowser:s6
        container_name: filebrowser
        environment:
            - PUID=${PUID?error}
            - PGID=${PGID?error}
            - TZ=${TIMEZONE:-Etc/UTC}
        volumes:
            - "${COMMON_STORAGE?error}/config/filebrowser:/config"
            - "${COMMON_STORAGE?error}/data/filebrowser:/database"
            - "${COMMON_STORAGE?error}/:/srv"
        ports:
            - "8087:80"
        restart: unless-stopped
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.filebrowser.rule=Host(`filebrowser.${MAIN_ENDPOINT?error}`)"
            - "traefik.http.routers.filebrowser.entrypoints=web"
            - "traefik.http.services.filebrowser.loadbalancer.server.port=80"
            - "traefik.docker.network=traefik-net"
        networks:
            - traefik-net

networks:
    traefik-net:
        external: true
