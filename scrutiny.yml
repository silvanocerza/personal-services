services:
    scrutiny:
        image: ghcr.io/analogj/scrutiny:master-omnibus
        container_name: scrutiny
        environment:
            - PUID=${PUID?error}
            - PGID=${PGID?error}
            - UMASK=${UMASK?error}
            - TZ=${TIMEZONE:-Etc/UTC}
        volumes:
            - ${COMMON_STORAGE?error}/config/scrutiny:/opt/scrutiny/config
            - ${COMMON_STORAGE?error}/config/scrutiny/influxdb2:/opt/scrutiny/influxdb
            - /run/udev:/run/udev:ro
        ports:
            - 8083:8080
            - 8086:8086
        devices:
            - /dev/sda
            - /dev/sdb
        cap_add:
            - SYS_RAWIO
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.scrutiny.rule=Host(`scrutiny.${MAIN_ENDPOINT?error}`)"
            - "traefik.http.routers.scrutiny.entrypoints=web"
            - "traefik.http.services.scrutiny.loadbalancer.server.port=8080"
            - "traefik.docker.network=traefik-net"
        restart: unless-stopped
        networks:
            - traefik-net

networks:
    traefik-net:
        external: true
