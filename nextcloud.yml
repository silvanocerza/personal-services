services:
    nextcloud:
        image: lscr.io/linuxserver/nextcloud:latest
        container_name: nextcloud
        environment:
            - PUID=${PUID?error}
            - PGID=${PGID?error}
            - TZ=${TIMEZONE:-Etc/UTC}
        volumes:
            - "${COMMON_STORAGE?error}/config/nextcloud:/config"
            - "${COMMON_STORAGE?error}/data/nextcloud:/data"
        ports:
            - "8085:80"
        restart: unless-stopped
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.nextcloud.rule=Host(`nextcloud.${MAIN_ENDPOINT?error}`)"
            - "traefik.http.routers.nextcloud.entrypoints=web"
            - "traefik.http.services.nextcloud.loadbalancer.server.port=80"
        networks:
            - traefik-net

networks:
    traefik-net:
        external: true
